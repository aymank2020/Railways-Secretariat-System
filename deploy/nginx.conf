# nginx config for the Flutter Web bundle of the Railway Secretariat System.
#
# - Serves the static SPA from /usr/share/nginx/html.
# - Reverse-proxies /api/* to the Dart server (hostname: server, port 8080).
# - Adds basic security headers and disables directory listing.
# - Exposes a /healthz endpoint that does not require the API server.

upstream secretariat_api {
    # In docker-compose.prod.yml the Dart server is reachable as `server`.
    server server:8080;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Increase body size to match server (50 MB).
    client_max_body_size 60m;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/html
        text/plain;

    # Lightweight liveness probe answered by nginx alone.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Proxy /api/* to the Dart server.
    location /api/ {
        proxy_pass         http://secretariat_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Allow up to 60 MB request bodies (server enforces 50 MB itself).
        client_max_body_size 60m;
    }

    # Long-cache for hashed Flutter assets.
    location ~* \.(?:js|css|wasm|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Static SPA bundle. Flutter Web serves index.html as the entry point;
    # client-side routing is handled by Flutter, so unknown paths fall back
    # to the bundle.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        autoindex off;
    }
}
