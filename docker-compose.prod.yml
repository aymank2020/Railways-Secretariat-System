# Production compose stack for the Railway Secretariat System (Flutter version).
#
# Services:
#   server       – Dart-only API server (port 8080, internal-only by default)
#   web          – nginx + Flutter Web bundle, exposes port 80 to the LAN
#   cloudflared  – optional outbound Cloudflare Tunnel for remote (WARP) access
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# All persistent state (SQLite DB + uploaded attachments) lives in the
# `secretariat_data` named volume so containers can be rebuilt freely.
services:
  server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    image: railways-secretariat-server:latest
    container_name: railways-secretariat-server
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SECRETARIAT_SERVER_HOST: 0.0.0.0
      SECRETARIAT_SERVER_PORT: 8080
      SECRETARIAT_STORAGE_ROOT: /opt/secretariat/secretariat_data
      SECRETARIAT_DB_PATH: /opt/secretariat/secretariat_data/secretariat.db
      SECRETARIAT_LOG_REQUESTS: ${SECRETARIAT_LOG_REQUESTS:-1}
      SECRETARIAT_LOGIN_RATE_LIMIT: ${SECRETARIAT_LOGIN_RATE_LIMIT:-10}
      SECRETARIAT_CORS_ORIGINS: ${SECRETARIAT_CORS_ORIGINS:-}
    volumes:
      - secretariat_data:/opt/secretariat/secretariat_data
      - secretariat_logs:/opt/secretariat/logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --max-time 2 http://127.0.0.1:8080/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - secretariat

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    image: railways-secretariat-web:latest
    container_name: railways-secretariat-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_BIND_HOST:-0.0.0.0}:${WEB_BIND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --max-time 2 http://127.0.0.1/healthz > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - secretariat

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: railways-secretariat-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      web:
        condition: service_started
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - secretariat

volumes:
  secretariat_data:
    name: railways_secretariat_data
  secretariat_logs:
    name: railways_secretariat_logs

networks:
  secretariat:
    name: railways_secretariat_net
    driver: bridge
