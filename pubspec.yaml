name: railway_secretariat
description: نظام إدارة المراسلات - السكك الحديدية
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State Management
  provider: ^6.1.1

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.2
  sqflite_common_ffi_web: ^1.0.1+2
  path: ^1.8.3

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # UI Components
  data_table_2: ^2.5.10

  # File Handling
  file_picker: ^10.3.10
  image_picker: ^1.2.0
  open_filex: ^4.3.4
  # speech_to_text: ^7.3.0

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1
  image: ^4.3.0

  # Date/Time
  intl: ^0.20.2
  excel: ^4.0.6
  crypto: ^3.0.7

  # HTTP
  http: ^1.5.0

  # Desktop Support
  window_manager: ^0.5.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/warid_a3_template.png
