name: Release

# Builds the Flutter Android APK and Windows desktop bundle as downloadable
# artefacts, and (for tag builds) publishes them as a GitHub Release.
#
# Triggers
# --------
# 1) `push` of a `v*` tag (e.g. `v1.0.6`)        — full Release on the Releases tab.
# 2) `workflow_dispatch` (manual run from the    — artefacts only, no Release.
#    "Actions" tab on github.com)                  Lets the operator bake a custom
#                                                  API_BASE_URL into the binary.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: |
          API base URL to bake into the binary (e.g. https://railways.tail6243bc.ts.net/).
          Leave empty to ship a build that prompts the user for the URL on first launch.
        required: false
        default: 'https://railways.tail6243bc.ts.net/'
      label:
        description: |
          Suffix used in the artefact filenames (e.g. `prod`, `beta`).
          Leave empty to fall back to `dev-<short-sha>`.
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-24.04
    outputs:
      apk_name: ${{ steps.rename_apk.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK (release)
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          # Trim and forward the URL exactly so a leading/trailing space in the
          # workflow input doesn't end up baked into the binary.
          api_base_url="${API_BASE_URL:-}"
          api_base_url="$(echo -n "$api_base_url" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          echo "Baking API_BASE_URL='${api_base_url}' into Android APK"
          flutter build apk --release --dart-define=API_BASE_URL="${api_base_url}"

      - name: Compute artefact label
        id: label
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            label="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.label }}" ]]; then
            label="${{ inputs.label }}"
          else
            label="dev-${GITHUB_SHA::7}"
          fi
          echo "label=${label}" >> "$GITHUB_OUTPUT"

      - name: Rename APK with label
        id: rename_apk
        run: |
          set -euo pipefail
          src="build/app/outputs/flutter-apk/app-release.apk"
          dst="build/app/outputs/flutter-apk/Railways-Secretariat-${{ steps.label.outputs.label }}.apk"
          mv "$src" "$dst"
          echo "apk_path=$dst" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$dst")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.rename_apk.outputs.apk_path }}
          retention-days: 14

  build-windows:
    name: Build Windows desktop
    runs-on: windows-2022
    outputs:
      zip_name: ${{ steps.package_windows.outputs.zip_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows (release)
        shell: pwsh
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          $apiBaseUrl = "$env:API_BASE_URL".Trim()
          Write-Host "Baking API_BASE_URL='$apiBaseUrl' into Windows build"
          flutter build windows --release --dart-define=API_BASE_URL="$apiBaseUrl"

      - name: Package Windows build
        id: package_windows
        shell: pwsh
        run: |
          if ("$env:GITHUB_REF" -like "refs/tags/*") {
            $label = "$env:GITHUB_REF_NAME"
          } elseif ("${{ inputs.label }}" -ne "") {
            $label = "${{ inputs.label }}"
          } else {
            $label = "dev-" + $env:GITHUB_SHA.Substring(0,7)
          }
          $zipName = "Railways-Secretariat-$label-windows-x64.zip"
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) {
            $src = "build/windows/runner/Release"
          }
          Compress-Archive -Path "$src/*" -DestinationPath $zipName -CompressionLevel Optimal
          Write-Output "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.package_windows.outputs.zip_path }}
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-android, build-windows]
    # Only publish when triggered by a tag push.  Manual runs only produce
    # downloadable artefacts.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.zip
