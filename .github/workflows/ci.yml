name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dart-server:
    name: Dart server build & test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart SDK 3.5.4
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.5.4

      - name: Use server-only pubspec
        run: cp pubspec_server.yaml pubspec.yaml

      - name: Install Dart dependencies
        run: dart pub get

      - name: Analyze (server-only build)
        # Only analyze the Dart-only entry point and shelf middleware; the
        # rest of lib/ is Flutter UI code that intentionally uses packages
        # not available in the server pubspec.
        run: dart analyze lib/server_main.dart lib/server

      - name: Compile server binary
        run: |
          mkdir -p build_artifacts
          dart compile exe lib/server_main.dart -o build_artifacts/server_main

      - name: Smoke test the binary
        env:
          SECRETARIAT_SERVER_PORT: "18080"
          SECRETARIAT_DB_PATH: "/tmp/ci-secretariat.db"
          SECRETARIAT_STORAGE_ROOT: "/tmp/ci-storage"
        run: |
          set -euo pipefail
          mkdir -p "${SECRETARIAT_STORAGE_ROOT}"
          ./build_artifacts/server_main &
          SERVER_PID=$!
          sleep 4
          curl --fail --silent --max-time 5 "http://127.0.0.1:${SECRETARIAT_SERVER_PORT}/api/health"
          kill "${SERVER_PID}" || true

  flutter-web:
    name: Flutter Web build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Web (release)
        run: flutter build web --release --no-wasm-dry-run --dart-define=API_BASE_URL=

      - name: Upload Flutter Web bundle
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-${{ github.sha }}
          path: build/web
          retention-days: 7

  docker-images:
    name: Docker images build
    runs-on: ubuntu-24.04
    needs: [dart-server, flutter-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: false
          tags: railways-secretariat-server:ci
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: railways-secretariat-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
