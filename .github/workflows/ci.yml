name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dart-server:
    name: Dart server build & test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart SDK 3.5.4
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.5.4

      - name: Use server-only pubspec
        run: cp pubspec_server.yaml pubspec.yaml

      - name: Install Dart dependencies
        run: dart pub get

      - name: Analyze (server-only build)
        # Only analyze the Dart-only entry point and shelf middleware; the
        # rest of lib/ is Flutter UI code that intentionally uses packages
        # not available in the server pubspec.
        run: dart analyze lib/server_main.dart lib/server

      - name: Run unit + regression tests
        # Two test files are server-safe (no Flutter imports):
        #   * test/server_modules_test.dart   — helpers, middleware, sessions
        #   * test/security_hardening_test.dart — PR #6/#7/#9 regression suite
        # The wider Flutter widget tests run under flutter-web's analyze step.
        run: dart test test/server_modules_test.dart test/security_hardening_test.dart

      - name: Compile server binary
        run: |
          mkdir -p build_artifacts
          dart compile exe lib/server_main.dart -o build_artifacts/server_main

      - name: Smoke test the binary
        env:
          SECRETARIAT_SERVER_PORT: "18080"
          SECRETARIAT_DB_PATH: "/tmp/ci-secretariat.db"
          SECRETARIAT_STORAGE_ROOT: "/tmp/ci-storage"
        run: |
          set -euo pipefail
          mkdir -p "${SECRETARIAT_STORAGE_ROOT}"
          ./build_artifacts/server_main &
          SERVER_PID=$!
          sleep 4
          curl --fail --silent --max-time 5 "http://127.0.0.1:${SECRETARIAT_SERVER_PORT}/api/health"
          kill "${SERVER_PID}" || true

  shellcheck:
    name: Shellcheck (deploy scripts)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        # Lint every shell script under deploy/scripts/. -S error keeps the
        # noise floor low: only fail CI on definite bugs, not style nags.
        # Run via xargs so the action returns a non-zero exit if *any*
        # script fails, rather than masking errors behind shell short-circuit.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          find deploy/scripts -type f -name '*.sh' -print0 \
            | xargs -0 -r shellcheck -S error

  hadolint:
    name: Hadolint (Dockerfiles)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile.server
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/Dockerfile.server
          # Treat warnings as info to avoid blocking on style issues; only
          # fail on actual errors. Tighten later if desired.
          failure-threshold: error

      - name: Lint Dockerfile.web
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/Dockerfile.web
          failure-threshold: error

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        # Scan the repo source tree for known vulnerabilities in declared
        # dependencies (pubspec.lock, package files), and for misconfigured
        # IaC/Dockerfiles. Surface CRITICAL/HIGH only — LOW/MEDIUM
        # findings tend to be informational and would generate too much
        # noise on every PR. Vulnerability DB updates are cached by the
        # action.
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          format: 'table'

  flutter-web:
    name: Flutter Web build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Web (release)
        run: flutter build web --release --no-wasm-dry-run --dart-define=API_BASE_URL=

      - name: Upload Flutter Web bundle
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-${{ github.sha }}
          path: build/web
          retention-days: 7

  flutter-android:
    name: Flutter Android APK
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK (release)
        # Single fat APK so end-users only need to download one file. The
        # default API base URL is left empty so the app falls back to the
        # SECRETARIAT_API_BASE_URL env / Settings screen at first launch.
        run: flutter build apk --release --dart-define=API_BASE_URL=

      - name: Rename APK with version + sha
        id: rename_apk
        run: |
          set -euo pipefail
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}' | head -1)
          short_sha=${GITHUB_SHA::7}
          src="build/app/outputs/flutter-apk/app-release.apk"
          dst="build/app/outputs/flutter-apk/Railways-Secretariat-${version}-${short_sha}.apk"
          mv "$src" "$dst"
          echo "apk_path=$dst" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$dst")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.rename_apk.outputs.apk_path }}
          retention-days: 30

  flutter-windows:
    name: Flutter Windows desktop
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release --dart-define=API_BASE_URL=

      - name: Package Windows build
        id: package_windows
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | ForEach-Object { $_.Line.Split()[1] })[0]
          $shortSha = $env:GITHUB_SHA.Substring(0,7)
          $zipName = "Railways-Secretariat-$version-$shortSha-windows-x64.zip"
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) {
            $src = "build/windows/runner/Release"
          }
          Compress-Archive -Path "$src/*" -DestinationPath $zipName -CompressionLevel Optimal
          Write-Output "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ github.sha }}
          path: ${{ steps.package_windows.outputs.zip_path }}
          retention-days: 30

  docker-images:
    name: Docker images build
    runs-on: ubuntu-24.04
    needs: [dart-server, flutter-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: false
          tags: railways-secretariat-server:ci
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: railways-secretariat-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
